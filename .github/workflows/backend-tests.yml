name: Backend Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: uphill
          POSTGRES_PASSWORD: uphill_secret
          POSTGRES_DB: uphill_ai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U uphill -d uphill_ai_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://uphill:uphill_secret@localhost:5432/uphill_ai_test
      ENVIRONMENT: development
      GEMINI_API_KEY: test-key-not-real
      JWT_SECRET: ci-test-secret
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - name: Install dependencies
        run: cd backend && pip install -r requirements-dev.txt
      - name: Run unit tests
        run: cd backend && pytest tests/unit -q
      - name: Run integration tests
        run: cd backend && pytest tests/integration -q --cov=. --cov-report=term-missing

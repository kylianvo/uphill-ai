services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: uphill_ai
      POSTGRES_USER: uphill
      POSTGRES_PASSWORD: uphill_secret
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uphill -d uphill_ai"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: uphill-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://uphill:uphill_secret@db:5432/uphill_ai
      PYTHONUNBUFFERED: "1"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - ./backend/qdrant_storage:/qdrant/storage

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./backend/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    image: grafana/grafana-oss:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-changeme}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus

  node-exporter:
    image: prom/node-exporter:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:9100:9100"

  metabase:
    image: metabase/metabase:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: uphill_ai
      MB_DB_PORT: 5432
      MB_DB_USER: uphill
      MB_DB_PASS: ${POSTGRES_PASSWORD:-uphill_secret}
      MB_DB_HOST: db
      JAVA_OPTS: "-Xmx512m -Xms256m"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
    name: uphill-ai_pgdata
  prometheus_data:
  grafana_data:

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: uphill_ai
      POSTGRES_USER: uphill
      POSTGRES_PASSWORD: uphill_secret
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uphill -d uphill_ai"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: uphill-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://uphill:uphill_secret@db:5432/uphill_ai
      PYTHONUNBUFFERED: "1"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload



volumes:
  pgdata:

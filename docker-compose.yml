services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: uphill_ai
      POSTGRES_USER: uphill
      POSTGRES_PASSWORD: uphill_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uphill -d uphill_ai"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: uphill-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://uphill:uphill_secret@db:5432/uphill_ai
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      PYTHONUNBUFFERED: "1"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: uphill-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    # By default, runs a temporary quick tunnel (no account needed).
    # The public URL will be printed in the container logs: 'docker compose logs tunnel'
    command: tunnel --no-autoupdate --url http://backend:8000
    # To use a persistent named tunnel instead:
    # 1. Create a tunnel in Cloudflare Zero Trust and get its token.
    # 2. Add CLOUDFLARE_TUNNEL_TOKEN=your-token to backend/.env
    # 3. Comment out the 'command' line above, and uncomment the lines below:
    # environment:
    #   - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN:-}
    # command: tunnel --no-autoupdate run
    depends_on:
      - backend

volumes:
  pgdata:

repos:
  # General file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.md$
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: mixed-line-ending
        args: [--fix=lf]

  # Python — lint + format (backend)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  # TypeScript/JS — ESLint (frontend)
  - repo: local
    hooks:
      - id: frontend-eslint
        name: ESLint (frontend)
        language: system
        entry: bash -c 'cd frontend && npm run lint'
        pass_filenames: false
        files: ^frontend/src/

  # Python — fast unit tests only (backend). No DB/network — safe on every commit.
  # Requires `pip install -r backend/requirements-dev.txt` in backend/.venv once.
  - repo: local
    hooks:
      - id: backend-unit-tests
        name: Backend unit tests (pytest, no DB/network)
        language: system
        entry: bash -c 'cd backend && .venv/bin/pytest tests/unit -q'
        pass_filenames: false
        files: ^backend/(main\.py|db\.py|services/|parsers/|tests/unit/)

  # TypeScript/JS — fast unit tests only (frontend). No backend/browser needed.
  - repo: local
    hooks:
      - id: frontend-unit-tests
        name: Frontend unit tests (vitest)
        language: system
        entry: bash -c 'cd frontend && npm run test -- --run'
        pass_filenames: false
        files: ^frontend/src/

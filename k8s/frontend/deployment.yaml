apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: uphill-prod
  labels:
    app: uphill-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: uphill-frontend
  template:
    metadata:
      labels:
        app: uphill-frontend
    spec:
      containers:
      - name: frontend
        image: uphill-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: frontend-config
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 20
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
